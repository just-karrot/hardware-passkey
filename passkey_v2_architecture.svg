<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
<title>PassKey v2 architecture diagram</title>
<desc>System showing keypad PIN entry on Arduino unlocking the serial bridge, which Python then uses to encrypt and store passwords in EEPROM</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
<mask id="imagine-text-gaps"><rect x="0" y="0" width="680" height="520" fill="white"/><rect x="42" y="37" width="70" height="20" fill="black" rx="2"/><rect x="122" y="73" width="75" height="22" fill="black" rx="2"/><rect x="54" y="92" width="211" height="20" fill="black" rx="2"/><rect x="62" y="145" width="74" height="22" fill="black" rx="2"/><rect x="63" y="162" width="72" height="20" fill="black" rx="2"/><rect x="351" y="37" width="180" height="20" fill="black" rx="2"/><rect x="503" y="73" width="83" height="22" fill="black" rx="2"/><rect x="495" y="92" width="99" height="20" fill="black" rx="2"/><rect x="446" y="150" width="97" height="22" fill="black" rx="2"/><rect x="393" y="167" width="204" height="20" fill="black" rx="2"/><rect x="421" y="183" width="147" height="20" fill="black" rx="2"/><rect x="398" y="247" width="42" height="22" fill="black" rx="2"/><rect x="380" y="264" width="78" height="20" fill="black" rx="2"/><rect x="533" y="247" width="62" height="22" fill="black" rx="2"/><rect x="493" y="264" width="143" height="20" fill="black" rx="2"/><rect x="450" y="327" width="88" height="22" fill="black" rx="2"/><rect x="400" y="346" width="188" height="20" fill="black" rx="2"/><rect x="498" y="253" width="56" height="20" fill="black" rx="2"/><rect x="423" y="410" width="142" height="22" fill="black" rx="2"/><rect x="413" y="429" width="163" height="20" fill="black" rx="2"/><rect x="408" y="445" width="173" height="20" fill="black" rx="2"/><rect x="284" y="147" width="60" height="20" fill="black" rx="2"/></mask></defs>

<!-- PC region -->
<rect x="30" y="30" width="260" height="200" rx="14" fill="none" stroke="rgba(222, 220, 209, 0.3)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="46" y="52" fill="rgb(194, 192, 182)" font-family="sans-serif" font-size="12">PC (Python)</text>

<!-- passkey.py box -->
<g font-family="sans-serif">
  <rect x="50" y="64" width="220" height="52" rx="8" fill="rgb(60, 52, 137)" stroke="rgb(175, 169, 236)" stroke-width="0.5"/>
  <text x="160" y="85" text-anchor="middle" dominant-baseline="central" fill="rgb(206, 203, 246)" font-size="14" font-weight="500">passkey.py</text>
  <text x="160" y="103" text-anchor="middle" dominant-baseline="central" fill="rgb(175, 169, 236)" font-size="12">PBKDF2 key derivation - AES-256-GCM</text>
</g>

<!-- Master password box -->
<g font-family="sans-serif">
  <rect x="50" y="140" width="100" height="44" rx="8" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.5"/>
  <text x="100" y="157" text-anchor="middle" dominant-baseline="central" fill="rgb(211, 209, 199)" font-size="14" font-weight="500">Master pw</text>
  <text x="100" y="173" text-anchor="middle" dominant-baseline="central" fill="rgb(180, 178, 169)" font-size="12">typed on PC</text>
</g>

<!-- Arrow master pw -> passkey.py -->
<line x1="100" y1="140" x2="120" y2="118" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Arduino region -->
<rect x="340" y="30" width="310" height="460" rx="14" fill="none" stroke="rgba(222, 220, 209, 0.3)" stroke-width="0.5" stroke-dasharray="6 4"/>
<text x="356" y="52" fill="rgb(194, 192, 182)" font-family="sans-serif" font-size="12">Arduino Uno (Wokwi simulation)</text>

<!-- Keypad -->
<g font-family="sans-serif">
  <rect x="460" y="64" width="170" height="52" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="545" y="85" text-anchor="middle" dominant-baseline="central" fill="rgb(159, 225, 203)" font-size="14" font-weight="500">4x4 keypad</text>
  <text x="545" y="103" text-anchor="middle" dominant-baseline="central" fill="rgb(93, 202, 165)" font-size="12">PIN entry by user</text>
</g>

<!-- State machine box -->
<g font-family="sans-serif">
  <rect x="360" y="140" width="270" height="72" rx="8" fill="rgb(99, 56, 6)" stroke="rgb(239, 159, 39)" stroke-width="0.5"/>
  <text x="495" y="162" text-anchor="middle" dominant-baseline="central" fill="rgb(250, 199, 117)" font-size="14" font-weight="500">State machine</text>
  <text x="495" y="178" text-anchor="middle" dominant-baseline="central" fill="rgb(239, 159, 39)" font-size="12">FIRST_RUN -> LOCKED -> UNLOCKED</text>
  <text x="495" y="194" text-anchor="middle" dominant-baseline="central" fill="rgb(239, 159, 39)" font-size="12">3 wrong PINs -> LOCKOUT</text>
</g>

<!-- Keypad -> state machine -->
<line x1="495" y1="116" x2="495" y2="138" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LCD 1602 -->
<g font-family="sans-serif">
  <rect x="360" y="238" width="120" height="52" rx="8" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.5"/>
  <text x="420" y="259" text-anchor="middle" dominant-baseline="central" fill="rgb(211, 209, 199)" font-size="14" font-weight="500">LCD 1602</text>
  <text x="420" y="275" text-anchor="middle" dominant-baseline="central" fill="rgb(180, 178, 169)" font-size="12">status + slots</text>
</g>

<!-- RGB LED -->
<g font-family="sans-serif">
  <rect x="500" y="238" width="130" height="52" rx="8" fill="rgb(68, 68, 65)" stroke="rgb(180, 178, 169)" stroke-width="0.5"/>
  <text x="565" y="259" text-anchor="middle" dominant-baseline="central" fill="rgb(211, 209, 199)" font-size="14" font-weight="500">RGB LED</text>
  <text x="565" y="275" text-anchor="middle" dominant-baseline="central" fill="rgb(180, 178, 169)" font-size="12">red=locked : green=open</text>
</g>

<!-- State machine -> LCD and LED -->
<line x1="440" y1="212" x2="420" y2="236" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="550" y1="212" x2="565" y2="236" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Serial bridge box (Wokwi RFC2217) -->
<g font-family="sans-serif">
  <rect x="360" y="318" width="270" height="52" rx="8" fill="rgb(8, 80, 65)" stroke="rgb(93, 202, 165)" stroke-width="0.5"/>
  <text x="495" y="339" text-anchor="middle" dominant-baseline="central" fill="rgb(159, 225, 203)" font-size="14" font-weight="500">RFC2217 Bridge (4000)</text>
  <text x="495" y="357" text-anchor="middle" dominant-baseline="central" fill="rgb(93, 202, 165)" font-size="12">PING - READ - WRITE - DISP - LOCK</text>
</g>

<!-- State machine -> serial bridge (only when unlocked) -->
<line x1="495" y1="212" x2="495" y2="316" stroke="rgb(156, 154, 146)" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow)" mask="url(#imagine-text-gaps)"/>
<text x="502" y="268" fill="rgb(194, 192, 182)" font-family="sans-serif" font-size="12">unlocked</text>

<!-- EEPROM -->
<g font-family="sans-serif">
  <rect x="360" y="398" width="270" height="72" rx="8" fill="rgb(12, 68, 124)" stroke="rgb(133, 183, 235)" stroke-width="0.5"/>
  <text x="495" y="422" text-anchor="middle" dominant-baseline="central" fill="rgb(181, 212, 244)" font-size="14" font-weight="500">EEPROM (1024 bytes)</text>
  <text x="495" y="440" text-anchor="middle" dominant-baseline="central" fill="rgb(133, 183, 235)" font-size="12">bytes 0-7: PIN (Arduino-only)</text>
  <text x="495" y="456" text-anchor="middle" dominant-baseline="central" fill="rgb(133, 183, 235)" font-size="12">bytes 8+: salt + encrypted slots</text>
</g>

<!-- Serial bridge -> EEPROM -->
<line x1="495" y1="370" x2="495" y2="396" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- USB connection line (PC <-> Arduino) -->
<line x1="272" y1="90" x2="358" y2="240" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)" mask="url(#imagine-text-gaps)"/>
<line x1="358" y1="240" x2="272" y2="90" stroke="rgb(156, 154, 146)" stroke-width="1.5" marker-end="url(#arrow)" mask="url(#imagine-text-gaps)"/>

<!-- USB label -->
<rect x="275" y="148" width="80" height="20" rx="4" fill="rgb(37, 62, 95)"/>
<text x="315" y="162" text-anchor="middle" fill="rgb(194, 192, 182)" font-family="sans-serif" font-size="12">USB serial</text>

</svg>